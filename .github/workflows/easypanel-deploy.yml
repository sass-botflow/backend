# Legacy: deploy hook on push. Prefer docker-publish.yml → trigger-easypanel job.
# Kept so pushes still attempt deploy if webhook secret exists.

name: Trigger EasyPanel Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel backend redeploy
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_BACKEND_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "Skip: add repository secret EASYPANEL_BACKEND_DEPLOY_WEBHOOK"
            echo "See DEPLOY.md for manual EasyPanel Docker Compose setup"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
          echo "Backend deploy triggered"
