name: Trigger EasyPanel Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel backend redeploy
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_BACKEND_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "Skip: add repository secret EASYPANEL_BACKEND_DEPLOY_WEBHOOK"
            echo "EasyPanel → backend → Deploy → copy Deploy Hook URL"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
          echo "Backend deploy triggered"

  deploy-evolution:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'deploy/evolution-api/') || contains(github.event.head_commit.added, 'deploy/evolution-api/')
    steps:
      - name: Trigger EasyPanel evolution-api redeploy
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_EVOLUTION_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "Skip: add EASYPANEL_EVOLUTION_DEPLOY_WEBHOOK"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
