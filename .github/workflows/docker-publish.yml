name: Build and Push Backend Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sass-botflow/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package public
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const org = context.repo.owner;
            const repo = context.repo.repo;
            const candidates = [
              { type: 'org', name: 'backend' },
              { type: 'org', name: `${org}%2F${repo}` },
              { type: 'org', name: `${org}/${repo}` },
              { type: 'repo', name: repo },
            ];

            for (const pkg of candidates) {
              try {
                if (pkg.type === 'org') {
                  await github.rest.packages.getPackageForOrganization({
                    package_type: 'container',
                    org,
                    package_name: pkg.name,
                  });
                  await github.request(
                    'PUT /orgs/{org}/packages/{package_type}/{package_name}/visibility',
                    {
                      org,
                      package_type: 'container',
                      package_name: pkg.name,
                      visibility: 'public',
                    },
                  );
                } else {
                  await github.rest.packages.getPackageForRepository({
                    owner: org,
                    repo,
                    package_type: 'container',
                    package_name: pkg.name,
                  });
                  await github.request(
                    'PUT /repos/{owner}/{repo}/packages/{package_type}/{package_name}/visibility',
                    {
                      owner: org,
                      repo,
                      package_type: 'container',
                      package_name: pkg.name,
                      visibility: 'public',
                    },
                  );
                }
                core.info(`Package ${pkg.type}:${pkg.name} is now public`);
                return;
              } catch (error) {
                core.warning(`Could not set ${pkg.type}:${pkg.name} public: ${error.message}`);
              }
            }

            core.summary
              .addHeading('GHCR still private — use one of these', 2)
              .addList([
                `Make public: https://github.com/orgs/${org}/packages/container/backend/settings`,
                'EasyPanel → Registry: ghcr.io + GitHub PAT (read:packages)',
                'EasyPanel → GitHub + Dockerfile (no GHCR needed) — see EASYPANEL-DEPLOY.md',
              ])
              .write();

      - name: Verify anonymous pull works
        continue-on-error: true
        run: |
          DIGEST=$(curl -fsSI "https://ghcr.io/v2/${{ env.IMAGE_NAME }}/manifests/latest" 2>&1 | head -1)
          echo "Manifest response: $DIGEST"
          if echo "$DIGEST" | grep -q '401'; then
            echo "::warning::GHCR image is still private. EasyPanel cannot pull without registry credentials."
            echo "Fix: github.com/orgs/${{ github.repository_owner }}/packages → backend → Public"
          else
            echo "OK: image is pullable without auth"
          fi

      - name: Summary
        run: |
          echo "## Backend image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA tag | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| buildCommit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### EasyPanel deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "See **EASYPANEL-DEPLOY.md** in repo." >> "$GITHUB_STEP_SUMMARY"
          echo "1. **Easiest:** Source → GitHub → Dockerfile → branch \`main\` (no GHCR)" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Or GHCR pull + set \`JWT_SECRET\`, \`EVOLUTION_API_KEY\`" >> "$GITHUB_STEP_SUMMARY"

  trigger-easypanel:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel backend redeploy
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_BACKEND_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::notice::Add secret EASYPANEL_BACKEND_DEPLOY_WEBHOOK for auto-deploy"
            echo "EasyPanel → backend → Deploy → Deploy Hook URL"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
          echo "EasyPanel deploy triggered after image push"
