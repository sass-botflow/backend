name: Build and Push Backend Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sass-botflow/backend
  DOCKERHUB_IMAGE: sassbotflow/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (optional)
        id: dockerhub-login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="ghcr.io/sass-botflow/backend:latest,ghcr.io/sass-botflow/backend:${SHORT_SHA}"
          if [ "${{ steps.dockerhub-login.outcome }}" = "success" ] && [ -n "$DOCKERHUB_USER" ]; then
            TAGS="${TAGS},docker.io/${DOCKERHUB_USER}/sassbotflow/backend:latest"
            TAGS="${TAGS},docker.io/${DOCKERHUB_USER}/sassbotflow/backend:${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/sass-botflow/backend
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package public
        uses: actions/github-script@v7
        env:
          ADMIN_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN || secrets.PACKAGES_TOKEN }}
        with:
          github-token: ${{ env.ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const org = context.repo.owner;
            const names = ['backend', `${org}/backend`, `${org}%2Fbackend`];

            async function setOrgPublic(packageName) {
              await github.rest.packages.getPackageForOrganization({
                package_type: 'container',
                org,
                package_name: packageName,
              });
              await github.request(
                'PUT /orgs/{org}/packages/{package_type}/{package_name}/visibility',
                {
                  org,
                  package_type: 'container',
                  package_name: packageName,
                  visibility: 'public',
                },
              );
              core.info(`Package ${packageName} is now public`);
              return true;
            }

            try {
              const { organization } = await github.graphql(`
                query($org: String!) {
                  organization(login: $org) {
                    packages(first: 20, packageType: DOCKER) {
                      nodes { id name }
                    }
                  }
                }
              `, { org });
              for (const pkg of organization?.packages?.nodes ?? []) {
                if (!/backend/i.test(pkg.name)) continue;
                await github.graphql(`
                  mutation($id: ID!) {
                    updatePackagesVisibility(input: {
                      packageIds: [$id]
                      visibility: PUBLIC
                    }) { updatedPackageIds }
                  }
                `, { id: pkg.id });
                core.info(`GraphQL public: ${pkg.name}`);
              }
            } catch (e) {
              core.warning(`GraphQL: ${e.message}`);
            }

            for (const name of names) {
              try {
                if (await setOrgPublic(name)) break;
              } catch (e) {
                core.warning(`${name}: ${e.message}`);
              }
            }

      - name: Verify anonymous pull works
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -I \
            "https://ghcr.io/v2/sass-botflow/backend/manifests/latest")
          echo "Anonymous manifest HTTP: $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::warning::GHCR still private ($CODE). EasyPanel: add Registry ghcr.io + PAT read:packages"
            echo "Or: Source = GitHub + Dockerfile (see easypanel.docker-compose.build.yml)"
            echo "Manual: https://github.com/orgs/sass-botflow/packages/container/backend/settings"
          else
            echo "OK: image is pullable without auth"
          fi

      - name: Summary
        run: |
          echo "## Backend image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA tag | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| buildCommit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### EasyPanel deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "See **EASYPANEL-DEPLOY.md** in repo." >> "$GITHUB_STEP_SUMMARY"
          echo "1. **No registry (recommended):** Source → GitHub → Dockerfile → \`main\`" >> "$GITHUB_STEP_SUMMARY"
          echo "2. GHCR pull + Registry PAT or public package" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Docker Hub image if DOCKERHUB_* secrets configured" >> "$GITHUB_STEP_SUMMARY"

  trigger-easypanel:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel backend redeploy
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_BACKEND_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::notice::Add secret EASYPANEL_BACKEND_DEPLOY_WEBHOOK for auto-deploy"
            echo "EasyPanel → backend → Deploy → Deploy Hook URL"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
          echo "EasyPanel deploy triggered after image push"
