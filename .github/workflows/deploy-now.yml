name: Deploy backend now (EasyPanel webhook)

# Paste EasyPanel Deployment Trigger URL and click Run.
# EasyPanel → sass-botflow → backend → Deployments → Deployment Trigger

on:
  workflow_dispatch:
    inputs:
      easypanel_webhook:
        description: "Deployment Trigger URL (http://YOUR-IP:3000/api/deploy/xxxxxxxx)"
        required: true
        type: string

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push latest
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/sass-botflow/backend:latest
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            CACHEBUST=${{ github.run_id }}

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Validate webhook URL
        run: |
          WEBHOOK="${{ inputs.easypanel_webhook }}"
          if ! echo "$WEBHOOK" | grep -qE '^https?://.+/api/deploy/'; then
            echo "::error::Invalid URL. Expected: http://IP:3000/api/deploy/xxxxxxxx"
            exit 1
          fi

      - name: Trigger EasyPanel deploy
        run: |
          echo "Triggering EasyPanel backend deploy..."
          curl -fsS -X POST "${{ inputs.easypanel_webhook }}"
          echo "Deploy triggered."

      - name: Wait for rollout
        run: sleep 45

      - name: Verify production health
        run: |
          HEALTH=$(curl -fsS https://api.botflow.ink/health || echo '{"buildCommit":"error"}')
          echo "$HEALTH"
          BUILD=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('buildCommit',''))" 2>/dev/null || echo "unknown")
          WHATSAPP=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('modules',{}).get('whatsapp', d.get('modules',{}).get('channels')))" 2>/dev/null || echo "?")
          CONNECT=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://api.botflow.ink/api/channels/whatsapp/connect)
          {
            echo "## Backend deploy result"
            echo ""
            echo "| Check | Value |"
            echo "|-------|-------|"
            echo "| buildCommit | \`$BUILD\` |"
            echo "| modules | \`$WHATSAPP\` |"
            echo "| POST /connect | \`$CONNECT\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$BUILD" = "v1.0.0-mr84xgy9" ]; then
            echo "::warning::Still on OLD image. EasyPanel Source must be GitHub+Dockerfile OR pull ghcr.io/sass-botflow/backend:latest"
            exit 1
          fi
          if [ "$CONNECT" = "404" ]; then
            echo "::warning::/connect still 404 — redeploy did not switch image"
            exit 1
          fi
          echo "Deploy OK — buildCommit=$BUILD connect=$CONNECT"
