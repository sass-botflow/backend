# EasyPanel → sass-botflow → backend → Source → Docker Compose
# Paste this file OR point to: deploy/easypanel-backend.compose.yml
#
# Deploy khass yakhod 2-5 D9AYEQ (build). Ila 2 THANIYA = restart ghir (ghalat).

name: botflow-backend

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.easypanel
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-main}
        CACHEBUST: ${CACHEBUST:-1}
    image: botflow-backend:local
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: "8000"
      BUILD_COMMIT: ${BUILD_COMMIT:-easypanel}
      DATABASE_URL: postgresql://botflow:botflow@sass-botflow_postgres:5432/postgres?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in EasyPanel Environment}
      EVOLUTION_API_URL: http://sass-botflow_botflow-evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:?Set EVOLUTION_API_KEY in EasyPanel Environment}
      EVOLUTION_WEBHOOK_URL: https://api.botflow.ink/webhooks/evolution
      BACKEND_URL: https://api.botflow.ink
      FRONTEND_URL: https://www.botflow.ink
      CORS_ORIGIN: https://botflow.ink,https://www.botflow.ink
      N8N_WEBHOOK_URL: https://ecomgcc21.app.n8n.cloud/webhook/0edc08c4-6908-43ce-8f9f-dbc5ace31958
