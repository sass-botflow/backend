name: botflow-evolution

services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: botflow_evolution_api
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    environment:
      SERVER_URL: ${SERVER_URL}
      SERVER_PORT: "8080"
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@evolution-postgres:5432/${POSTGRES_DATABASE}?schema=evolution_api
      DATABASE_CONNECTION_CLIENT_NAME: botflow_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/1
      CACHE_REDIS_PREFIX_KEY: botflow_evolution
      WEBSOCKET_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LOG_LEVEL: ERROR,WARN,INFO
      LANGUAGE: en
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    ports:
      - "8080:8080"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  evolution-postgres:
    image: postgres:16-alpine
    container_name: botflow_evolution_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - listen_addresses=*
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evolution -d evolution']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  evolution-redis:
    image: redis:7-alpine
    container_name: botflow_evolution_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - evolution_redis_data:/data
    networks:
      evolution-net:
        aliases:
          - evolution-redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  evolution_instances:
    name: botflow_evolution_instances
  evolution_postgres_data:
    name: botflow_evolution_postgres_data
  evolution_redis_data:
    name: botflow_evolution_redis_data

networks:
  evolution-net:
    name: botflow-evolution-net
    driver: bridge
