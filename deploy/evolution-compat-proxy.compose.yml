# EasyPanel → New service "evolution-compat" → Source: Docker Compose
# Fixes WhatsApp QR spinner WITHOUT redeploying frontend code.
#
# After deploy, change FRONTEND env:
#   EVOLUTION_API_URL=http://sass-botflow_evolution-compat:8089

services:
  evolution-compat:
    build:
      context: ./deploy/evolution-compat-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      PORT: "8089"
      EVOLUTION_UPSTREAM: http://sass-botflow_botflow-evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
