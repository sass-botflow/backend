# BotFlow backend — EasyPanel Docker Compose (pull pre-built image, NO VPS build).
# Copy this entire file into EasyPanel → sass-botflow → + Service → Docker Compose
#
# Deploy must take 1–2 minutes (image pull). If it finishes in ~5 seconds, you are
# NOT deploying a new image — switch from GitHub source to this Compose file.

services:
  backend:
    image: ghcr.io/sass-botflow/backend:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: "8000"
      DATABASE_URL: postgresql://botflow:botflow@sass-botflow_postgres:5432/postgres?sslmode=disable
      META_APP_ID: "1811541566932500"
      META_EMBEDDED_SIGNUP_CONFIG_ID: "1353028573456188"
      META_VERIFY_TOKEN: botflow-wa-verify-7k9m2x4p8q
      META_WHATSAPP_REDIRECT_URI: https://api.botflow.ink/api/channels/whatsapp/callback
      N8N_WEBHOOK_URL: https://ecomgcc21.app.n8n.cloud/webhook/0edc08c4-6908-43ce-8f9f-dbc5ace31958
      FRONTEND_URL: https://www.botflow.ink
      CORS_ORIGIN: https://botflow.ink,https://www.botflow.ink
      # REQUIRED secrets — set in EasyPanel Environment UI:
      # JWT_SECRET, META_APP_SECRET, TOKEN_ENCRYPTION_KEY
