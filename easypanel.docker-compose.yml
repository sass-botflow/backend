# EasyPanel production — pull pre-built image
#
# OPTION A — GHCR (default):
#   image: ghcr.io/sass-botflow/backend:latest
#   Requires: package public OR Registry ghcr.io + GitHub PAT (read:packages)
#
# OPTION B — Docker Hub (if DOCKERHUB_TOKEN secret configured in GitHub Actions):
#   image: docker.io/sassbotflow/backend:latest
#
# OPTION C — Build on VPS (no registry):
#   Use easypanel.docker-compose.build.yml OR Source = GitHub + Dockerfile

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/sass-botflow/backend:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: "8000"
      DATABASE_URL: postgresql://botflow:botflow@sass-botflow_postgres:5432/postgres?sslmode=disable
      EVOLUTION_API_URL: http://sass-botflow_evolution-api:8080
      EVOLUTION_WEBHOOK_URL: https://api.botflow.ink/webhooks/evolution
      BACKEND_URL: https://api.botflow.ink
      N8N_WEBHOOK_URL: https://ecomgcc21.app.n8n.cloud/webhook/0edc08c4-6908-43ce-8f9f-dbc5ace31958
      FRONTEND_URL: https://www.botflow.ink
      CORS_ORIGIN: https://botflow.ink,https://www.botflow.ink
      JWT_SECRET: BotflowJwtSecret2026Min32CharsLong!!
      EVOLUTION_API_KEY: BotflowEvolution2026SecureKey!
