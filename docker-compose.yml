services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: file:/app/data/prod.db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://botflow.ink,https://www.botflow.ink}
    volumes:
      - api-data:/app/data

volumes:
  api-data:
