# LOCAL DEV ONLY — postgres + redis + api
# For EasyPanel production deploy see EASYPANEL-DEPLOY.md

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://botflow:botflow@postgres:5432/botflow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://host.docker.internal:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-dev-key}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://botflow.ink,https://www.botflow.ink,http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: botflow
      POSTGRES_PASSWORD: botflow
      POSTGRES_DB: botflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
